<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sett Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid #e5e5e5;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
    }

#messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      max-width: 720px;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 14px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .msg.user {
      align-self: flex-end;
      background: #1d4ed8;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.assistant {
      align-self: flex-start;
      background: #f4f4f5;
      border: 1px solid #e5e5e5;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
    }

    .msg .cost {
      margin-top: 8px;
      font-size: 11px;
      opacity: 0.55;
    }

    .msg.thinking {
      align-self: flex-start;
      background: #f4f4f5;
      border: 1px solid #e5e5e5;
      color: #888;
      font-style: italic;
    }

    .dot-pulse::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
      100% { content: ''; }
    }

    #input-area {
      padding: 16px 24px;
      border-top: 1px solid #e5e5e5;
      display: flex;
      gap: 12px;
    }

    #input-area textarea {
      flex: 1;
      background: #ffffff;
      border: 1px solid #d4d4d8;
      border-radius: 10px;
      padding: 12px 16px;
      color: #1a1a1a;
      font-family: inherit;
      font-size: 14px;
      resize: none;
      outline: none;
      min-height: 44px;
      max-height: 160px;
    }

    #input-area textarea:focus {
      border-color: #1d4ed8;
    }

    #input-area button {
      background: #1d4ed8;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0 20px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    #input-area button:hover { background: #2563eb; }
    #input-area button:disabled { background: #d4d4d8; color: #fff; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>Sett Chat</h1>
</header>

  <div id="messages"></div>

  <div id="input-area">
    <textarea id="input" rows="1" placeholder="Send a message..." autofocus></textarea>
    <button id="send">Send</button>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send");

    // Auto-resize textarea
    inputEl.addEventListener("input", () => {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + "px";
    });

    function addMessage(role, text, cost) {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.textContent = text;
      if (cost != null) {
        const costEl = document.createElement("div");
        costEl.className = "cost";
        costEl.textContent = `$${cost.toFixed(4)}`;
        div.appendChild(costEl);
      }
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function addThinking() {
      const div = document.createElement("div");
      div.className = "msg thinking";
      div.innerHTML = 'Thinking<span class="dot-pulse"></span>';
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = "";
      inputEl.style.height = "auto";
      sendBtn.disabled = true;

      addMessage("user", text);
      const thinking = addThinking();

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text }),
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        thinking.remove();
        addMessage("assistant", data.reply, data.cost_usd);
      } catch (err) {
        thinking.remove();
        addMessage("assistant", `Error: ${err.message}`);
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener("click", send);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    async function loadHistory() {
      try {
        const res = await fetch("/history");
        if (!res.ok) return;
        const data = await res.json();
        for (const msg of data.messages || []) {
          const role = msg.role === "agent" ? "assistant" : "user";
          addMessage(role, msg.message);
        }
      } catch (e) {
        console.error("History load failed:", e);
      }
    }
    loadHistory();
  </script>
</body>
</html>
